server {
    listen 80;
    server_name localhost;

    # Root directory where React build files are served from
    root /usr/share/nginx/html;
    index index.html;

    # ─── Static Assets ───────────────────────────────────────
    # Cache JS, CSS, images aggressively — they have hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── React Router Support ────────────────────────────────
    # This is critical — without this, refreshing /products or /login
    # would return 404 because nginx looks for those as actual files
    # Instead we always serve index.html and let React Router handle routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ─── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
